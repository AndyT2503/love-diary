<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">💕</div>
    <h1>Love Diary</h1>
    <p class="subtitle">Welcome back, dear</p>

    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required placeholder="••••••••" />
      </div>

      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-link">Don't have an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
