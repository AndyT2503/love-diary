<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">💕</div>
    <h1>Love Diary</h1>
    <p class="subtitle">Start your story together</p>

    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" required placeholder="your_username" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required minlength="6" placeholder="••••••••" />
      </div>

      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-link">Already have an account? <a routerLink="/login">Sign In</a></p>
  </div>
</div>
